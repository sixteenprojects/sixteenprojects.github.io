  <rect x="88" y="178" width="116" height="16" rx="3" fill="rgba(29,78,216,0.7)"/>
  <text x="212" y="190" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="white" font-weight="600">6/12</text>

  <!-- Turla: 5/12 -->
  <rect x="88" y="208" width="232" height="16" rx="3" fill="rgba(255,255,255,0.07)"/>
  <rect x="88" y="208" width="97" height="16" rx="3" fill="rgba(29,78,216,0.55)"/>
  <text x="193" y="220" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="white" font-weight="600">5/12</text>

  <!-- TTP pills at bottom -->
  <g font-family="'Segoe UI',Arial,sans-serif" font-size="8.5">
    <rect x="40" y="240" width="48" height="16" rx="8" fill="rgba(29,78,216,0.4)"/>
    <text x="64" y="251" text-anchor="middle" fill="rgba(255,255,255,0.85)">T1190</text>

    <rect x="96" y="240" width="54" height="16" rx="8" fill="rgba(29,78,216,0.4)"/>
    <text x="123" y="251" text-anchor="middle" fill="rgba(255,255,255,0.85)">T1059.004</text>

    <rect x="158" y="240" width="54" height="16" rx="8" fill="rgba(29,78,216,0.4)"/>
    <text x="185" y="251" text-anchor="middle" fill="rgba(255,255,255,0.85)">T1505.003</text>

    <rect x="220" y="240" width="44" height="16" rx="8" fill="rgba(29,78,216,0.4)"/>
    <text x="242" y="251" text-anchor="middle" fill="rgba(255,255,255,0.85)">T1078</text>

    <rect x="272" y="240" width="44" height="16" rx="8" fill="rgba(29,78,216,0.3)"/>
    <text x="294" y="251" text-anchor="middle" fill="rgba(255,255,255,0.7)">+8 more</text>
