<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="The Sixteen Project — Threat Intelligence Hub">
  <meta name="referrer" content="no-referrer">

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://unpkg.com https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://cdn.jsdelivr.net;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https:;
    connect-src 'self' https://api.github.com;
    frame-src 'none';
    object-src 'none';
    base-uri 'self';
  ">

  <title>TI-Hub — The Sixteen Project</title>
  <link rel="shortcut icon" type="image/jpg" href="../assets/lp/img/logo_main.jpg"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Leaflet (world map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <!-- Local CSS -->
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/table.css">
  <link rel="stylesheet" href="assets/css/detail.css">
  <link rel="stylesheet" href="assets/css/map.css">
  <link rel="stylesheet" href="assets/css/visualizations.css">
</head>
<body>

  <!-- ══ App Shell ══════════════════════════════════════════════════ -->
  <div id="app" class="app-shell">

    <!-- Sidebar trigger zone (invisible hover target) -->
    <div id="sidebar-trigger" class="sidebar-trigger" aria-hidden="true"></div>

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <nav id="sidebar" class="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar-logo">
        <a href="../index.html" class="sidebar-logo-link">
          <img src="../assets/lp/img/logo_main.jpg" alt="The Sixteen Project" class="sidebar-logo-img">
          <div class="sidebar-logo-text">
            <span class="sidebar-logo-title">THE SIXTEEN PROJECT</span>
            <span class="sidebar-logo-sub">TI-Hub</span>
          </div>
        </a>
      </div>

      <div class="sidebar-search">
        <div class="sidebar-search-wrap">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6.5" cy="6.5" r="5"/><path d="M11 11l3 3"/>
          </svg>
          <input type="search" id="global-search" placeholder="Search everything…"
                 autocomplete="off" spellcheck="false" aria-label="Global search">
        </div>
      </div>

      <ul class="sidebar-nav" role="list">
        <li class="sidebar-section-label">Overview</li>
        <li class="sidebar-item">
          <a href="#/overview" class="sidebar-link" data-view="overview">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="1" y="1" width="6" height="6" rx="1"/>
              <rect x="9" y="1" width="6" height="6" rx="1"/>
              <rect x="1" y="9" width="6" height="6" rx="1"/>
              <rect x="9" y="9" width="6" height="6" rx="1"/>
            </svg>
            <span>Dashboard</span>
          </a>
        </li>

        <li class="sidebar-section-label">Threat Intelligence</li>
        <li class="sidebar-item">
          <a href="#/malware" class="sidebar-link" data-view="malware">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="8" r="7"/>
              <path d="M8 5v3l2 2"/>
              <circle cx="8" cy="8" r="2" fill="currentColor" stroke="none" opacity=".3"/>
            </svg>
            <span>Malware Library</span>
            <span class="sidebar-count" id="count-malware">—</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="#/actors" class="sidebar-link" data-view="actors">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="5" r="3"/>
              <path d="M2 14c0-3 2.7-5 6-5s6 2 6 5"/>
            </svg>
            <span>Threat Actors</span>
            <span class="sidebar-count" id="count-actors">—</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="#/ransomware" class="sidebar-link" data-view="ransomware">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="7" width="10" height="8" rx="1"/>
              <path d="M5 7V5a3 3 0 016 0v2"/>
              <circle cx="8" cy="11" r="1" fill="currentColor" stroke="none"/>
            </svg>
            <span>Ransomware Groups</span>
            <span class="sidebar-count" id="count-ransomware">—</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="#/victims" class="sidebar-link" data-view="victims">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M8 1L2 4v5c0 3.5 2.5 6.3 6 7 3.5-.7 6-3.5 6-7V4L8 1z"/>
              <path d="M5 8l2 2 4-4"/>
            </svg>
            <span>Victims Feed</span>
            <span class="sidebar-count" id="count-victims">—</span>
          </a>
        </li>

        <li class="sidebar-section-label">Visualizations</li>
        <li class="sidebar-item">
          <a href="#/map" class="sidebar-link" data-view="map">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="8" r="7"/>
              <path d="M1 8h14M8 1c-2 2-3 4-3 7s1 5 3 7M8 1c2 2 3 4 3 7s-1 5-3 7"/>
            </svg>
            <span>World Map</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="#/graph" class="sidebar-link" data-view="graph">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="8" r="2"/>
              <circle cx="2" cy="4" r="1.5"/>
              <circle cx="14" cy="4" r="1.5"/>
              <circle cx="2" cy="12" r="1.5"/>
              <circle cx="14" cy="12" r="1.5"/>
              <path d="M3.1 4.6L6.1 6.9M9.9 6.9l3-2.3M3.1 11.4l3-2.3M9.9 9.1l3 2.3"/>
            </svg>
            <span>Threat Graph</span>
          </a>
        </li>
      </ul>

      <div class="sidebar-footer">
        <a href="../index.html" class="sidebar-link sidebar-link-back">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M10 12L6 8l4-4"/>
          </svg>
          <span>Back to Site</span>
        </a>
      </div>
    </nav>

    <!-- ── Main Content ─────────────────────────────────────────── -->
    <div class="main-wrapper">

      <!-- Top header bar -->
      <header class="main-header" role="banner">
        <div class="header-left">
          <button id="sidebar-pin-btn" class="btn btn-ghost btn-icon" title="Pin sidebar"
                  aria-label="Pin/unpin sidebar">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 2l5 5-1.5 1.5L11 7l-4 4 1 2-5 2 2-5 2 1 4-4-1.5-1.5L9 2z"/>
            </svg>
          </button>
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <span id="breadcrumb-root" class="breadcrumb-item">TI-Hub</span>
            <span class="breadcrumb-sep">›</span>
            <span id="breadcrumb-current" class="breadcrumb-item breadcrumb-active">Dashboard</span>
          </nav>
        </div>

        <div class="header-right">
          <!-- Last updated -->
          <div class="header-meta">
            <span class="text-muted text-sm">Updated:</span>
            <span id="last-updated" class="text-sm font-medium">Loading…</span>
          </div>

          <!-- Refresh button -->
          <button id="refresh-btn" class="btn btn-secondary btn-sm" title="Refresh data">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" id="refresh-icon">
              <path d="M14 8A6 6 0 112 8"/>
              <path d="M14 4v4h-4"/>
            </svg>
            <span>Refresh</span>
          </button>

          <!-- Theme toggle -->
          <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle dark/light mode">
            <!-- Moon (shown in light mode) -->
            <svg class="icon-moon" viewBox="0 0 16 16" fill="currentColor">
              <path d="M6 .278a.768.768 0 01.08.858A7.208 7.208 0 005.294 6a7.086 7.086 0 007 7c1.175 0 2.274-.26 3.271-.767a.788.788 0 01.87.1c.14.14.194.34.142.536A8.5 8.5 0 016 15.5 8.5 8.5 0 016 .278z"/>
            </svg>
            <!-- Sun (shown in dark mode) -->
            <svg class="icon-sun" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 11a3 3 0 110-6 3 3 0 010 6zm0 1a4 4 0 100-8 4 4 0 000 8zM8 0a.5.5 0 01.5.5v2a.5.5 0 01-1 0v-2A.5.5 0 018 0zm0 13a.5.5 0 01.5.5v2a.5.5 0 01-1 0v-2A.5.5 0 018 13zm8-5a.5.5 0 01-.5.5h-2a.5.5 0 010-1h2a.5.5 0 01.5.5zM3 8a.5.5 0 01-.5.5h-2a.5.5 0 010-1h2A.5.5 0 013 8zm10.657-5.657a.5.5 0 010 .707l-1.414 1.415a.5.5 0 11-.707-.707l1.414-1.414a.5.5 0 01.707 0zm-9.193 9.193a.5.5 0 010 .707L3.05 13.657a.5.5 0 01-.707-.707l1.414-1.414a.5.5 0 01.707 0zm9.193 2.121a.5.5 0 01-.707 0l-1.414-1.414a.5.5 0 01.707-.707l1.414 1.414a.5.5 0 010 .707zM4.464 4.465a.5.5 0 01-.707 0L2.343 3.05a.5.5 0 11.707-.707l1.414 1.414a.5.5 0 010 .707z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- View container — all views render here -->
      <main id="view-container" class="view-container" role="main" aria-live="polite">
        <div class="loading-overlay">
          <div class="spinner"></div>
          <p>Loading threat intelligence data…</p>
        </div>
      </main>
    </div>

    <!-- Detail panel (slide-in from right) -->
    <aside id="detail-panel" class="detail-panel" aria-label="Detail panel" hidden>
      <div class="detail-panel-header">
        <div class="detail-panel-title-wrap">
          <span id="detail-panel-badge" class="badge badge-blue"></span>
          <h2 id="detail-panel-title" class="detail-panel-title"></h2>
        </div>
        <button id="detail-panel-close" class="btn btn-ghost btn-icon" aria-label="Close detail">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4l8 8M12 4l-8 8"/>
          </svg>
        </button>
      </div>
      <div id="detail-panel-body" class="detail-panel-body"></div>
    </aside>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container" aria-live="assertive" aria-atomic="true"></div>
  </div>

  <!-- Search results overlay -->
  <div id="search-overlay" class="search-overlay" hidden role="dialog" aria-label="Search results">
    <div class="search-overlay-inner">
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <!-- External libraries (integrity hashes for SRI) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN2GqRQ=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"
          crossorigin=""></script>

  <!-- App entry point (ES module) -->
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
