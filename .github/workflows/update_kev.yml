name: Update CISA KEV Data

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at 00:00 UTC = 07:00 WIB
  workflow_dispatch:        # Manual trigger from GitHub UI → Actions tab

permissions:
  contents: write

jobs:
  update-kev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest CISA KEV catalog + NVD CVSS data
        run: python scripts/fetch_kev.py --output data/kev_data.json --force

      - name: Fetch MITRE ATT&CK threat actor attribution
        run: python scripts/fetch_threat_actors.py --output data/threat_actors.json

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kev_data.json data/threat_actors.json
          if git diff --staged --quiet; then
            echo "Data is already up to date. No commit needed."
          else
            TODAY=$(date -u +%Y-%m-%d)
            COUNT=$(python -c "import json; d=json.load(open('data/kev_data.json')); print(d['metadata']['totalCount'])")
            TA=$(python -c "import json; d=json.load(open('data/threat_actors.json')); print(d['metadata']['cvesWithActors'])")
            git commit -m "chore: update KEV + threat actor data [${TODAY}] (${COUNT} KEV, ${TA} CVEs with actors)"
            git push
          fi
