name: TI-Hub Data Update

on:
  schedule:
    - cron: "0 2 * * *"   # every day at 02:00 UTC
  workflow_dispatch:        # manual trigger from GitHub UI or API
    inputs:
      skip_malpedia:
        description: "Skip Malpedia fetch (faster run)"
        required: false
        default: "false"
        type: boolean
      skip_ransomware:
        description: "Skip Ransomware.live/RansomLook fetch"
        required: false
        default: "false"
        type: boolean
      with_otx:
        description: "Fetch OTX AlienVault IOCs (requires OTX_API_KEY secret)"
        required: false
        default: "false"
        type: boolean

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ti-hub/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r ti-hub/scripts/requirements.txt

      - name: Update world geodata (geo.json)
        run: |
          cd ti-hub/scripts
          python fetch_geodata.py

      - name: Run fetch_all.py (malware, actors, ransomware, victims, stats)
        env:
          RANSOMLOOK_API_KEY: ${{ secrets.RANSOMLOOK_API_KEY }}
        run: |
          cd ti-hub/scripts
          ARGS=""
          if [ "${{ github.event.inputs.skip_malpedia }}" = "true" ]; then
            ARGS="$ARGS --skip-malpedia"
          fi
          if [ "${{ github.event.inputs.skip_ransomware }}" = "true" ]; then
            ARGS="$ARGS --skip-ransomware"
          fi
          if [ "${{ github.event.inputs.with_otx }}" = "true" ]; then
            ARGS="$ARGS --with-otx"
          fi
          python fetch_all.py $ARGS

      - name: Fetch OTX AlienVault IOCs (scheduled daily)
        if: github.event_name == 'schedule'
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
        run: |
          cd ti-hub/scripts
          python fetch_otx.py
        continue-on-error: true

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ti-hub/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(ti-hub): auto-update threat intelligence data [$(date -u '+%Y-%m-%d')] [skip ci]"
            git push
          fi
