name: TI-Hub Data Update

on:
  schedule:
    - cron: "0 2 * * *"   # every day at 02:00 UTC
  workflow_dispatch:
    inputs:
      skip_malpedia:
        description: "Skip Malpedia fetch (faster run)"
        required: false
        default: "false"
        type: boolean
      skip_ransomware:
        description: "Skip Ransomware.live/RansomLook fetch"
        required: false
        default: "false"
        type: boolean
      with_otx_full:
        description: "Fetch OTX — FULL actor search (slow, ~8h, run once)"
        required: false
        default: "false"
        type: boolean
      with_otx_groups:
        description: "Fetch OTX group feeds (ransomware, malware, APT, etc.)"
        required: false
        default: "false"
        type: boolean
      with_threatfox:
        description: "Fetch ThreatFox + MalwareBazaar + URLhaus + FeodoTracker"
        required: false
        default: "false"
        type: boolean
      with_shodan:
        description: "Shodan IP enrichment + CVE exposure (requires SHODAN_API_KEY)"
        required: false
        default: "false"
        type: boolean

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ti-hub/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r ti-hub/scripts/requirements.txt

      - name: Update world geodata (geo.json)
        run: |
          cd ti-hub/scripts
          python fetch_geodata.py

      - name: Run fetch_all.py (malware, actors, ransomware, victims, stats)
        timeout-minutes: 30
        continue-on-error: true
        env:
          RANSOMLOOK_API_KEY: ${{ secrets.RANSOMLOOK_API_KEY }}
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
        run: |
          if [ -n "$OTX_API_KEY" ]; then
            echo "OTX_API_KEY: SET (length=${#OTX_API_KEY})"
          else
            echo "OTX_API_KEY: NOT SET or EMPTY"
          fi
          cd ti-hub/scripts
          ARGS=""
          if [ "${{ github.event.inputs.skip_malpedia }}" = "true" ]; then
            ARGS="$ARGS --skip-malpedia"
          fi
          if [ "${{ github.event.inputs.skip_ransomware }}" = "true" ]; then
            ARGS="$ARGS --skip-ransomware"
          fi
          python fetch_all.py $ARGS

      - name: OTX — Full actor search (manual, one-time)
        if: github.event.inputs.with_otx_full == 'true'
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
        run: |
          cd ti-hub/scripts
          python fetch_otx.py --full --groups
        continue-on-error: true
        timeout-minutes: 540

      - name: OTX — Group feeds (manual)
        if: github.event.inputs.with_otx_groups == 'true' && github.event.inputs.with_otx_full != 'true'
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
        run: |
          cd ti-hub/scripts
          python fetch_otx.py --groups
        continue-on-error: true

      - name: OTX — Incremental daily update (scheduled)
        if: github.event_name == 'schedule'
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
        run: |
          cd ti-hub/scripts
          python fetch_otx.py --groups
          python fetch_otx.py
        continue-on-error: true

      - name: ThreatFox + abuse.ch (manual)
        if: github.event.inputs.with_threatfox == 'true'
        run: |
          cd ti-hub/scripts
          python fetch_threatfox.py
        continue-on-error: true

      - name: ThreatFox + abuse.ch (scheduled daily)
        if: github.event_name == 'schedule'
        run: |
          cd ti-hub/scripts
          python fetch_threatfox.py --days 1
        continue-on-error: true

      - name: Shodan enrichment (manual)
        if: github.event.inputs.with_shodan == 'true'
        env:
          SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
        run: |
          cd ti-hub/scripts
          python fetch_shodan.py
        continue-on-error: true

      - name: Shodan CVE exposure (scheduled daily — free, no credits)
        if: github.event_name == 'schedule'
        env:
          SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
        run: |
          cd ti-hub/scripts
          python fetch_shodan.py --cve-only
        continue-on-error: true

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ti-hub/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(ti-hub): auto-update threat intelligence data [$(date -u '+%Y-%m-%d')] [skip ci]"
            git push
          fi
